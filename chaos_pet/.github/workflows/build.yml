name: Build FAP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with uFBT
        id: ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.4
        with:
          # Official stable SDK channel
          sdk-channel: release
          # If your app is in repo root, leave app-dir as "."
          app-dir: chaos_pet

      - name: Upload FAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaos_pet_fap
          path: |
            dist/*.fap
